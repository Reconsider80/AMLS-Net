# AMLS-Net default config (paper Sec. 5)
# Single-organ default: 256x256, batch 18

seed: 42
work_dir: runs/amls_net

# Data paths — update to your dataset
train_image_dir: data/TN3K/train/images
train_mask_dir: data/TN3K/train/masks
val_image_dir: data/TN3K/val/images
val_mask_dir: data/TN3K/val/masks
test_image_dir: data/TN3K/test/images
test_mask_dir: data/TN3K/test/masks

img_size: 256
batch_size: 8
num_workers: 4
in_chans: 3
num_classes: 1

# Model
dims: [64, 128, 256, 512]
sa_depths: [2, 2]
vssk_depths: [2, 2]
fuse_dim: 128
drop: 0.0
no_kan: false   # set true to replace KANLinear with nn.Linear (faster debug)

# Optim (paper)
lr: 0.0002
min_lr: 0.00001
weight_decay: 0.0001
epochs: 300
